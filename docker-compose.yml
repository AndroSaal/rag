services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    environment:
      HTTP_ADDR: ":8080"
      REQUEST_TIMEOUT_SECONDS: "30"
      CHUNK_SIZE: "220"
      CHUNK_OVERLAP: "40"
      DEFAULT_TOP_K: "5"

      # Free-tier option: OpenRouter (OpenAI-compatible). Requires LLM_API_KEY.
      LLM_PROVIDER: "${LLM_PROVIDER:-openrouter}"
      LLM_URL: "${LLM_URL:-https://openrouter.ai/api/v1/chat/completions}"
      LLM_MODEL: "${LLM_MODEL:-google/gemma-3-12b-it:free}"
      LLM_BACKOFF_MODELS: "${LLM_BACKOFF_MODELS:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      OPENROUTER_HTTP_REFERER: "${OPENROUTER_HTTP_REFERER:-http://localhost:8080}"
      OPENROUTER_APP_NAME: "${OPENROUTER_APP_NAME:-generic-rag}"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-openrouter}"
      EMBEDDING_URL: "${EMBEDDING_URL:-https://openrouter.ai/api/v1/embeddings}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      VECTOR_PROVIDER: "qdrant"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "rag_chunks"
      DATABASE_URL: "postgres://rag:rag@postgres:5432/rag?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  qdrant_data:
  pg_data:
  redis_data:
